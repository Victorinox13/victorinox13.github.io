<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engels Leren – New Strike 5</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f5fa; --surface:#ffffff; --surface2:#eef1f8; --border:#dce0ec;
    --accent:#4f6ef7; --accent2:#ff5c8a; --accent3:#0fb89a;
    --text:#1b1e2a; --muted:#6b7180; --correct:#16a34a; --wrong:#dc2626; --warning:#d97706;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.25}
  .shell{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:0 18px 60px}
  header{padding:30px 0 22px;display:flex;align-items:center;gap:15px;border-bottom:1px solid var(--border);margin-bottom:22px}
  .logo{width:46px;height:46px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
  header span{color:var(--muted);font-size:12.5px;font-weight:400;display:block;font-family:'DM Mono',monospace;margin-top:2px}
  .stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 15px;font-family:'DM Mono',monospace;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .stat b{color:var(--text);font-size:17px;font-family:'Syne';font-weight:700}
  .stat.green b{color:var(--correct)} .stat.red b{color:var(--wrong)} .stat.blue b{color:var(--accent)}
  /* filters */
  .filterbar{margin-bottom:18px}
  .filterbar .lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:20px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:.15s;user-select:none}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  /* tabs */
  .tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--border)}
  .tab{background:none;border:none;color:var(--muted);padding:11px 16px;font-family:'Syne';font-weight:700;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--text);border-bottom-color:var(--accent)}
  .panel{display:none} .panel.active{display:block}
  /* flashcard */
  .fc-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:9px;font-family:'Syne';font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .card{background:linear-gradient(160deg,#fff,var(--surface2));border:1px solid var(--border);border-radius:18px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 26px;cursor:pointer;text-align:center;position:relative;transition:.2s;box-shadow:0 6px 20px rgba(40,50,90,.06)}
  .card:hover{border-color:var(--accent)}
  .card .tag{position:absolute;top:14px;left:16px;font-family:'DM Mono',monospace;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .card .qword{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.25}
  .card .aword{font-size:23px;font-weight:600;color:var(--accent3);margin-top:18px;padding-top:18px;border-top:1px dashed var(--border);width:100%}
  .card .hint{position:absolute;bottom:14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
  .progress{height:6px;background:var(--surface);border-radius:6px;overflow:hidden;margin:16px 0 6px}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:.3s;width:0}
  .counter{text-align:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:14px}
  /* fill-in exercise */
  .ex-prompt{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .ex-card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:30px 26px;box-shadow:0 6px 20px rgba(40,50,90,.06)}
  .ex-q{font-size:25px;font-weight:800;line-height:1.4;margin-bottom:8px;letter-spacing:-.3px}
  .ex-sub{font-family:'DM Mono',monospace;font-size:12.5px;color:var(--muted);margin-bottom:20px}
  .ex-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-family:'Syne';font-weight:600;font-size:19px;padding:14px 16px;outline:none}
  .ex-input:focus{border-color:var(--accent)}
  .ex-input.ok{border-color:var(--correct)} .ex-input.bad{border-color:var(--wrong)}
  .ex-fb{margin-top:14px;font-size:14px;min-height:22px;font-weight:600}
  .ex-fb.ok{color:var(--correct)} .ex-fb.bad{color:var(--wrong)}
  .ex-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .done-box{text-align:center;padding:46px 20px}
  .done-box .big{font-size:42px;font-weight:800;margin-bottom:8px}
  .done-box p{color:var(--muted);margin-bottom:20px;font-family:'DM Mono',monospace;font-size:13px}
  .small{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
  .wordbank{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 18px}
  .wb{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text)}
  .wr-block{background:#fff;border:1px solid var(--border);border-radius:18px;padding:26px;margin-bottom:18px;box-shadow:0 6px 20px rgba(40,50,90,.06)}
  .wr-block h3{font-size:19px;font-weight:800;margin-bottom:4px}
  .wr-task{background:var(--surface2);border-left:3px solid var(--accent);padding:12px 14px;border-radius:8px;font-size:14px;line-height:1.5;margin:12px 0}
  .wr-area{width:100%;min-height:140px;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-family:'Syne';font-size:15px;padding:14px;outline:none;resize:vertical;line-height:1.5}
  .wr-area:focus{border-color:var(--accent)}
  .reveal{margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:14px;line-height:1.6;display:none}
  .reveal.show{display:block}
  .reveal h4{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace}
  .reveal .model{white-space:pre-line}
  .tiprow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  @media(max-width:560px){.card .qword{font-size:25px}.ex-q{font-size:21px}}
</style>
</head>

<div class="shell">
  <header>
    <div class="logo">🇬🇧</div>
    <div><h1>Engels Leren</h1><span>New Strike 5 · units 3-4-5-6-8 · proefexamen</span></div>
  </header>

  <div class="stats">
    <div class="stat blue">🃏 <b id="st-total">0</b> woorden</div>
    <div class="stat green">✅ <b id="st-correct">0</b> goed</div>
    <div class="stat red">❌ <b id="st-wrong">0</b> fout</div>
    <div class="stat">🔥 <b id="st-streak">0</b> streak</div>
  </div>

  <div class="filterbar">
    <div class="lbl">Units</div>
    <div class="chips" id="unit-chips"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('fc')">🃏 Flashcards</button>
    <button class="tab" onclick="switchTab('vt')">✍️ Woordtraining</button>
    <button class="tab" onclick="switchTab('gr')">📚 Grammatica</button>
    <button class="tab" onclick="switchTab('ex')">📝 Examenoefeningen</button>
    <button class="tab" onclick="switchTab('wr')">✏️ Schrijven</button>
  </div>

  <!-- FLASHCARDS -->
  <div id="panel-fc" class="panel active">
    <div class="fc-controls">
      <button class="btn" id="fc-dir" onclick="toggleDir()">EN → NL</button>
      <button class="btn" onclick="shuffleFC()">🔀 Shuffle</button>
      <span class="small">Klik op de kaart om de vertaling te tonen</span>
    </div>
    <div class="progress"><div id="fc-bar"></div></div>
    <div class="counter" id="fc-counter"></div>
    <div class="card" id="fc-card" onclick="flipCard()">
      <span class="tag" id="fc-tag"></span>
      <div class="qword" id="fc-q"></div>
      <div class="aword" id="fc-a" style="display:none"></div>
      <span class="hint" id="fc-hint">👆 klik om te tonen</span>
    </div>
    <div class="fc-controls" style="margin-top:16px;justify-content:space-between">
      <button class="btn" id="fc-prev" onclick="prevCard()">← Vorige</button>
      <button class="btn primary" id="fc-next" onclick="nextCard()">Volgende →</button>
    </div>
  </div>

  <!-- WOORDTRAINING -->
  <div id="panel-vt" class="panel">
    <div class="fc-controls">
      <button class="btn" id="vt-dir" onclick="toggleVtDir()">EN → NL</button>
      <button class="btn" onclick="startVt()">🔄 Herstart</button>
    </div>
    <div class="progress"><div id="vt-bar"></div></div>
    <div class="counter" id="vt-counter"></div>
    <div id="vt-body"></div>
  </div>

  <!-- GRAMMATICA -->
  <div id="panel-gr" class="panel">
    <div class="fc-controls">
      <div class="chips" id="gr-topics"></div>
    </div>
    <div class="progress"><div id="gr-bar"></div></div>
    <div class="counter" id="gr-counter"></div>
    <div id="gr-body"></div>
  </div>

  <!-- EXAMENOEFENINGEN -->
  <div id="panel-ex" class="panel">
    <div class="fc-controls">
      <div class="chips" id="ex-sets"></div>
    </div>
    <div class="progress"><div id="ex-bar"></div></div>
    <div class="counter" id="ex-counter"></div>
    <div id="ex-body"></div>
  </div>

  <!-- SCHRIJVEN -->
  <div id="panel-wr" class="panel">
    <p class="small" style="margin-bottom:14px">Schrijfoefeningen zoals op het examen. Schrijf je tekst, gebruik de tips, en vergelijk daarna met het modelantwoord.</p>
    <div id="wr-body"></div>
  </div>
</div>

let activeUnits = new Set(Object.keys(UNITS));
let correct=0, wrong=0, streak=0;

function pool(){ return WORDS.filter(x=>activeUnits.has(x.u)); }
function norm(s){
  s=s.toLowerCase().trim().replace(/[.,!?;]/g,'').replace(/\s+/g,' ');
  return s;
}
function stripArt(s){ return norm(s).replace(/^(de |het |een |the |a |an |to )/,''); }
function matchAns(input, answer){
  const i=norm(input); if(!i) return false;
  // answer may contain comma/slash alternatives
  const alts = answer.split(/[\/,]| of /).map(a=>norm(a)).filter(Boolean);
  alts.push(norm(answer));
  for(const a of alts){
    if(i===a) return true;
    if(stripArt(i)===stripArt(a)) return true;
  }
  return false;
}
function updStats(){
  document.getElementById('st-total').textContent=pool().length;
  document.getElementById('st-correct').textContent=correct;
  document.getElementById('st-wrong').textContent=wrong;
  document.getElementById('st-streak').textContent=streak;
}

  b.onclick=()=>{ if(activeUnits.has(k)){ if(activeUnits.size>1){activeUnits.delete(k);b.classList.remove('on');} } else {activeUnits.add(k);b.classList.add('on');}
    shuffleFC(); startVt(); updStats(); };
  uc.appendChild(b);
});

let vtDeck=[], vtI=0, vtDir='en', vtSolved=[];
function toggleVtDir(){ vtDir = vtDir==='en'?'nl':'en'; document.getElementById('vt-dir').textContent = vtDir==='en'?'EN → NL':'NL → EN'; startVt(); }
function startVt(){ vtDeck=[...pool()].sort(()=>Math.random()-0.5); vtI=0; vtSolved=[]; renderVt(); }
function renderVt(){
  const body=document.getElementById('vt-body');
  if(!vtDeck.length){ body.innerHTML='<p class="small">Geen woorden geselecteerd.</p>'; return; }
  if(vtI>=vtDeck.length){ renderVtDone(); return; }
  const c=vtDeck[vtI];
  const q = vtDir==='en'? c.en : c.nl;
  const answer = vtDir==='en'? c.nl : c.en;
  document.getElementById('vt-counter').textContent=`Woord ${vtI+1} / ${vtDeck.length}`;
  document.getElementById('vt-bar').style.width=(vtI/vtDeck.length*100)+'%';
  body.innerHTML=`
    <div class="ex-card">
      <div class="ex-prompt">${UNITS[c.u]} · vertaal naar het ${vtDir==='en'?'Nederlands':'Engels'}</div>
      <div class="ex-q">${q}</div>
      <input class="ex-input" id="vt-in" autocomplete="off" placeholder="Typ de vertaling..." />
      <div class="ex-fb" id="vt-fb"></div>
      <div class="ex-actions">
        <button class="btn" onclick="vtBack()" ${vtI===0?'disabled':''}>← Vorige</button>
        <button class="btn" onclick="vtReveal()">👁 Toon antwoord</button>
        <button class="btn primary" id="vt-check" onclick="vtCheck()">Controleer</button>
      </div>
    </div>`;
  const inp=document.getElementById('vt-in'); inp.focus();
  inp.dataset.answer=answer;
  inp.onkeydown=e=>{ if(e.key==='Enter') vtCheck(); };
}
function vtCheck(){
  const inp=document.getElementById('vt-in'); const fb=document.getElementById('vt-fb');
  const ans=inp.dataset.answer;
  if(matchAns(inp.value, ans)){
    inp.classList.add('ok'); fb.className='ex-fb ok'; fb.textContent='✅ Juist!';
    correct++; streak++; updStats();
    document.getElementById('vt-check').disabled=true;
    setTimeout(()=>{ vtI++; document.getElementById('vt-bar').style.width=(vtI/vtDeck.length*100)+'%'; renderVt(); }, 650);
  } else {
    inp.classList.add('bad'); fb.className='ex-fb bad'; fb.textContent='❌ Probeer opnieuw (of toon antwoord)';
    wrong++; streak=0; updStats();
    setTimeout(()=>inp.classList.remove('bad'),600);
  }
}
function vtReveal(){
  const inp=document.getElementById('vt-in'); const fb=document.getElementById('vt-fb');
  fb.className='ex-fb'; fb.style.color='var(--warning)'; fb.textContent='💡 '+inp.dataset.answer;
}
function vtBack(){ if(vtI>0){ vtI--; renderVt(); } }
function renderVtDone(){
  document.getElementById('vt-bar').style.width='100%';
  document.getElementById('vt-counter').textContent='Klaar!';
  document.getElementById('vt-body').innerHTML=`<div class="done-box"><div class="big">🎉</div><p>Alle ${vtDeck.length} woorden doorlopen.</p><button class="btn primary" onclick="startVt()">Opnieuw oefenen</button></div>`;
}

  const b=document.createElement('div'); b.className='chip'+(i===0?' on':''); b.textContent=s.title.split('·')[0].trim()+' '+s.id;
  b.dataset.i=i; b.onclick=()=>{ exChips.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); b.classList.add('on'); exSet=i; exI=0; renderEx(); };
  exChips.appendChild(b);
});
function renderEx(){
  const s=EXAM[exSet]; const body=document.getElementById('ex-body');
  document.getElementById('ex-counter').textContent=`${s.title} — ${Math.min(exI+1,s.items.length)} / ${s.items.length}`;
  document.getElementById('ex-bar').style.width=(exI/s.items.length*100)+'%';
  if(exI>=s.items.length){
    document.getElementById('ex-bar').style.width='100%';
    body.innerHTML=`<div class="done-box"><div class="big">✅</div><p>Oefening "${s.title}" volledig ingevuld!</p><button class="btn primary" onclick="exI=0;renderEx()">Opnieuw</button></div>`;
    return;
  }
  const c=s.items[exI];
  let bankHtml='';
  if(s.bank){ bankHtml='<div class="ex-prompt">Woordenlijst</div><div class="wordbank">'+s.bank.map(w=>`<span class="wb">${w}</span>`).join('')+'</div>'; }
  body.innerHTML=`
    <div class="ex-card">
      <div class="ex-prompt">${s.intro}</div>
      ${bankHtml}
      <div class="ex-q">${c.q.replace('___','<span style="color:var(--accent)">_____</span>')}</div>
      <input class="ex-input" id="ex-in" autocomplete="off" placeholder="Vul in..." />
      <div class="ex-fb" id="ex-fb"></div>
      <div class="ex-actions">
        <button class="btn" onclick="exBack()" ${exI===0?'disabled':''}>← Vorige</button>
        <button class="btn" onclick="exReveal()">👁 Toon antwoord</button>
        <button class="btn primary" id="ex-check" onclick="exCheck()">Controleer</button>
      </div>
    </div>`;
  const inp=document.getElementById('ex-in'); inp.focus();
  inp.onkeydown=e=>{ if(e.key==='Enter') exCheck(); };
}
function exCheck(){
  const s=EXAM[exSet]; const c=s.items[exI]; const inp=document.getElementById('ex-in'); const fb=document.getElementById('ex-fb');
  if(c.a.some(a=>matchAns(inp.value,a))){
    inp.classList.add('ok'); fb.className='ex-fb ok'; fb.textContent='✅ Juist!';
    correct++; streak++; updStats(); document.getElementById('ex-check').disabled=true;
    setTimeout(()=>{ exI++; renderEx(); }, 650);
  } else {
    inp.classList.add('bad'); fb.className='ex-fb bad'; fb.textContent='❌ Nog niet juist';
    wrong++; streak=0; updStats(); setTimeout(()=>inp.classList.remove('bad'),600);
  }
}
function exReveal(){ const s=EXAM[exSet]; const c=s.items[exI]; const fb=document.getElementById('ex-fb'); fb.className='ex-fb'; fb.style.color='var(--warning)'; fb.textContent='💡 '+c.a[0]; }
function exBack(){ if(exI>0){ exI--; renderEx(); } }
